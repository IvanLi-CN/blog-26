name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
  workflow_dispatch: # 允许手动触发

env:
  NODE_ENV: test
  ADMIN_MODE: true
  JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
  ADMIN_EMAIL: admin@test.com
  DB_PATH: ':memory:'
  WEBDAV_URL: http://localhost:8080
  WEBDAV_USERNAME: ''
  WEBDAV_PASSWORD: ''
  WEBDAV_MEMOS_PATH: /Memos
  WEBDAV_ASSETS_PATH: /assets

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3] # 将测试分片以提高并行性
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
            
      - name: Install dependencies
        run: bun install --frozen
        
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        
      - name: Generate test data
        run: |
          bun tests/e2e/utils/generate-test-images.ts
          bun run test-data:generate
          
      - name: Start WebDAV server
        run: bun run webdav:start &
        
      - name: Wait for WebDAV server
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080; do sleep 1; done'
          
      - name: Run E2E tests
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          PLAYWRIGHT_HTML_REPORT: test-results/html-report-${{ matrix.shard }}
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.shard }}
          path: |
            test-results/
            !test-results/html-report-*/
          retention-days: 7
          
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-html-report-${{ matrix.shard }}
          path: test-results/html-report-${{ matrix.shard }}/
          retention-days: 7
          
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.shard }}
          path: test-results/screenshots/
          retention-days: 3

  merge-reports:
    name: Merge Test Reports
    runs-on: ubuntu-22.04
    needs: e2e-tests
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'
          
      - name: Install dependencies
        run: bun install --frozen
        
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-html-report-*
          path: all-reports/
          merge-multiple: true
          
      - name: Merge HTML reports
        run: bunx playwright merge-reports --reporter html all-reports/
        
      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-merged-report
          path: playwright-report/
          retention-days: 14
          
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // 读取测试结果
            let testSummary = '## 🧪 E2E测试结果\n\n';
            
            try {
              const resultsPath = 'test-results/results.json';
              if (fs.existsSync(resultsPath)) {
                const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                const { stats } = results;
                
                testSummary += `- ✅ 通过: ${stats.passed}\n`;
                testSummary += `- ❌ 失败: ${stats.failed}\n`;
                testSummary += `- ⏭️ 跳过: ${stats.skipped}\n`;
                testSummary += `- 🕐 总时长: ${Math.round(stats.duration / 1000)}秒\n\n`;
                
                if (stats.failed > 0) {
                  testSummary += '### 失败的测试\n\n';
                  results.suites.forEach(suite => {
                    suite.specs.forEach(spec => {
                      if (spec.tests.some(test => test.results.some(result => result.status === 'failed'))) {
                        testSummary += `- ❌ ${spec.title}\n`;
                      }
                    });
                  });
                }
              } else {
                testSummary += '⚠️ 无法读取测试结果文件\n';
              }
            } catch (error) {
              testSummary += `⚠️ 解析测试结果时出错: ${error.message}\n`;
            }
            
            testSummary += '\n📊 [查看详细报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            
            // 发布评论
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testSummary
            });

  performance-test:
    name: Performance Test
    runs-on: ubuntu-22.04
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'
          
      - name: Install dependencies
        run: bun install --frozen
        
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        
      - name: Generate test data
        run: |
          bun tests/e2e/utils/generate-test-images.ts
          bun run test-data:generate
          
      - name: Start WebDAV server
        run: bun run webdav:start &
        
      - name: Wait for WebDAV server
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080; do sleep 1; done'
          
      - name: Run performance tests
        run: bunx playwright test --grep "性能|performance" --reporter=json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: performance-results.json
          
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: performance-results.json
          retention-days: 7
