name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许手动触发

env:
  REGISTRY: git.ivanli.cc
  IMAGE_NAME: ivan/blog-astrowind

jobs:
  # E2E 测试（分片并行运行）
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3] # 将测试分片以提高并行性

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Install dufs for WebDAV server
        run: |
          curl -fsSL https://github.com/sigoden/dufs/releases/download/v0.43.0/dufs-v0.43.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          sudo mv dufs /usr/local/bin/
          dufs --version

      - name: Create test directories
        run: |
          mkdir -p test-results
          mkdir -p data

      - name: Generate test data
        run: |
          bun tests/e2e/utils/generate-test-images.ts
          bun run test-data:generate
        env:
          DB_PATH: ./test-results/test.db
          NODE_ENV: test

      - name: Start WebDAV server
        run: bun run webdav:test &

      - name: Wait for WebDAV server
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080; do sleep 1; done'

      - name: Run database migrations
        run: bun run migrate
        env:
          DB_PATH: ./test-results/test.db
          NODE_ENV: test

      - name: Start Astro server
        run: ADMIN_MODE=true NODE_ENV=test DB_PATH=./test-results/test.db bunx --bun astro dev --host &

      - name: Wait for Astro server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:4321; do sleep 2; done'

      - name: Run E2E tests
        run: bunx playwright test --config=playwright.ci.config.ts --shard=${{ matrix.shard }}/3
        env:
          PLAYWRIGHT_HTML_REPORT: test-results/html-report-${{ matrix.shard }}
          DB_PATH: ./test-results/test.db
          NODE_ENV: test
          ADMIN_MODE: true
          WEBDAV_URL: http://localhost:8080
          WEBDAV_USERNAME: ""
          WEBDAV_PASSWORD: ""
          WEBDAV_MEMOS_PATH: /Memos
          JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
          ADMIN_EMAIL: admin@test.com
          OPENAI_API_KEY: test-key
          SITE_URL: http://localhost:4321
          SMTP_HOST: smtp.example.com
          SMTP_FROM_EMAIL: test@example.com
          PUBLIC_LUOSIMAO_SITE_KEY: test-site-key
          LUOSIMAO_SECRET_KEY: test-secret-key

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results-${{ matrix.shard }}
          path: |
            test-results/
            !test-results/html-report-*/
          retention-days: 7

      - name: Upload HTML report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-html-report-${{ matrix.shard }}
          path: test-results/html-report-${{ matrix.shard }}/
          retention-days: 7

  # 合并 E2E 测试报告
  merge-e2e-reports:
    name: Merge E2E Reports
    runs-on: ubuntu-22.04
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'

      - name: Install dependencies
        run: bun install --frozen

      - name: Download all reports
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-1
          path: all-reports/

      - name: Download report 2
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-2
          path: all-reports/

      - name: Download report 3
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-3
          path: all-reports/

      - name: Merge HTML reports
        run: bunx playwright merge-reports --reporter html all-reports/

      - name: Upload merged report
        uses: actions/upload-artifact@v3
        with:
          name: e2e-merged-report
          path: playwright-report/
          retention-days: 14

  # Telegram 通知
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-22.04
    needs: [e2e-tests, merge-e2e-reports]
    if: always()

    steps:
      - name: Determine test status
        id: status
        run: |
          if [[ "${{ needs.e2e-tests.result }}" == "success" && "${{ needs.merge-e2e-reports.result }}" == "success" ]]; then
            echo "status=✅ 成功" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ 失败" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="
          ${{ steps.status.outputs.emoji }} **E2E 测试结果**
          
          **项目**: \`${{ github.repository }}\`
          **分支**: \`${{ github.ref_name }}\`
          **提交**: \`${{ github.sha }}\`
          **作者**: ${{ github.actor }}
          **状态**: ${{ steps.status.outputs.status }}
          **触发**: ${{ github.event_name }}
          
          **详情**: [查看工作流](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          **提交信息**: ${{ github.event.head_commit.message }}
          "
