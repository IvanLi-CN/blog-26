name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [ published ]


env:
  REGISTRY: git.ivanli.cc
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        bun-version:
          - '1.2.13'
        node-version:
          - '22'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Use Bun.js v${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.bun-version }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.bun-version }}-bun-
      - run: bun install
      - run: bun run check

  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        bun-version:
          - '1.1.36'
    steps:
      - name: Git Setup
        run: |
          mkdir -p ~/.ssh
          echo 'Host git.ivanli.cc ' >> ~/.ssh/config
          echo '    HostName git.ivanli.cc' >> ~/.ssh/config
          echo '    Port 7018' >> ~/.ssh/config
          cat  ~/.ssh/config
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-known-hosts: '[git.ivanli.cc]:7018 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMiGxrZtYUwNcqesZDeJMnTkyNze4Ds7ms9Xu6rmUbCc'
          ssh-user: gitea
      - name: Use Bun.js v${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.bun-version }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.bun-version }}-bun-
      - run: bun install
      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps
      - run: bun run build
        env:
          PUBLIC_LUOSIMAO_SITE_KEY: ${{ secrets.PUBLIC_LUOSIMAO_SITE_KEY }}
      - uses: christopherhx/gitea-upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  docker:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: christopherhx/gitea-download-artifact@v4
        with:
          name: web-dist
          path: dist/
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.USER_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-22.04
    needs: docker
    steps:
      - name: Notify Watchtower
        run: |
          curl --oauth2-bearer ${{ secrets.WATCHTOWER_TOKEN }} 'https://watchtower.ivanli.cc/v1/update?images=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'

        env:
          WATCHTOWER_HOST: ${{ secrets.WATCHTOWER_HOST }}  # Watchtower 主机地址
          WATCHTOWER_PORT: ${{ secrets.WATCHTOWER_PORT }}  # Watchtower 端口

