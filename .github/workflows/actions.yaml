name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [ published ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Use Bun.js v1.1.36
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.36
      - run: bun install
      - run: bun run check

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version:
          - '1.1.36'
    steps:
      - uses: actions/checkout@v4
      - name: Use Bun.js v${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: 🐳 Build and publish
        uses: macbre/push-to-ghcr@v14
        with:
          image_name: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
