name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [ published ]


env:
  REGISTRY: git.ivanli.cc
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        bun-version:
          - '1.2.13'
    steps:
      - uses: actions/checkout@v4
      - name: Use Bun.js v${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.bun-version }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.bun-version }}-bun-
      - run: bun install
      - name: Run unit tests
        run: bun test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
          ADMIN_EMAIL: admin@test.com
          DB_PATH: ':memory:'
      - name: Run code quality checks
        run: bun run check

  e2e-test:
    name: Run E2E Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        bun-version:
          - '1.2.13'
    steps:
      - uses: actions/checkout@v4
      - name: Use Bun.js v${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.bun-version }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.bun-version }}-bun-
      - run: bun install
      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium
      - name: Generate test images
        run: bun tests/e2e/utils/generate-test-images.ts
      - name: Run E2E tests
        run: bun run test:e2e
        env:
          NODE_ENV: test
          ADMIN_MODE: true
          JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
          ADMIN_EMAIL: admin@test.com
          DB_PATH: ':memory:'
          WEBDAV_URL: http://localhost:8080
          WEBDAV_USERNAME: ''
          WEBDAV_PASSWORD: ''
          WEBDAV_MEMOS_PATH: /Memos
          WEBDAV_ASSETS_PATH: /assets
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            !test-results/html-report/
          retention-days: 7
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-html-report
          path: test-results/html-report/
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    needs: [test, e2e-test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.USER_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Get Git information
        id: git-info
        run: |
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "repository_url=https://git.ivanli.cc/${{ github.repository }}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.git-info.outputs.build_date }}
            COMMIT_HASH=${{ steps.git-info.outputs.commit_hash }}
            COMMIT_SHORT_HASH=${{ steps.git-info.outputs.commit_short_hash }}
            REPOSITORY_URL=${{ steps.git-info.outputs.repository_url }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-22.04
    needs: docker
    steps:
      - name: Notify Watchtower
        run: |
          curl --oauth2-bearer ${{ secrets.WATCHTOWER_TOKEN }} 'https://watchtower.ivanli.cc/v1/update?images=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'

        env:
          WATCHTOWER_HOST: ${{ secrets.WATCHTOWER_HOST }}  # Watchtower 主机地址
          WATCHTOWER_PORT: ${{ secrets.WATCHTOWER_PORT }}  # Watchtower 端口

