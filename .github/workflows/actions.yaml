name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [ published ]
  workflow_dispatch: # 允许手动触发

env:
  REGISTRY: git.ivanli.cc
  IMAGE_NAME: ${{ github.repository }}
  # E2E 测试环境变量
  NODE_ENV: test
  ADMIN_MODE: true
  JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
  ADMIN_EMAIL: admin@test.com
  DB_PATH: ':memory:'
  WEBDAV_URL: http://localhost:8080
  WEBDAV_USERNAME: ''
  WEBDAV_PASSWORD: ''
  WEBDAV_MEMOS_PATH: /Memos
  WEBDAV_ASSETS_PATH: /assets

jobs:
  # 单元测试和代码质量检查
  unit-tests:
    name: Unit Tests & Code Quality
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Run unit tests
        run: bun run test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
          ADMIN_EMAIL: admin@test.com
          DB_PATH: ':memory:'

      - name: Run code quality checks
        run: bun run check

  # E2E 测试（分片并行运行）
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3] # 将测试分片以提高并行性

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Install dufs for WebDAV server
        run: |
          curl -fsSL https://github.com/sigoden/dufs/releases/download/v0.43.0/dufs-v0.43.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          sudo mv dufs /usr/local/bin/
          dufs --version

      - name: Create test directories
        run: |
          mkdir -p test-results
          mkdir -p data

      - name: Generate test data
        run: |
          bun tests/e2e/utils/generate-test-images.ts
          bun run test-data:generate
        env:
          DB_PATH: ./test-results/test.db
          NODE_ENV: test

      - name: Start WebDAV server
        run: bun run webdav:test &

      - name: Wait for WebDAV server
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080; do sleep 1; done'

      - name: Run database migrations
        run: bun run migrate
        env:
          DB_PATH: ./test-results/test.db
          NODE_ENV: test

      - name: Start Astro server
        run: ADMIN_MODE=true NODE_ENV=test DB_PATH=./test-results/test.db bunx --bun astro dev --host &

      - name: Wait for Astro server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:4321; do sleep 2; done'

      - name: Run E2E tests
        run: bunx playwright test --config=playwright.ci.config.ts --shard=${{ matrix.shard }}/3
        env:
          PLAYWRIGHT_HTML_REPORT: test-results/html-report-${{ matrix.shard }}
          DB_PATH: ./test-results/test.db
          NODE_ENV: test
          ADMIN_MODE: true
          WEBDAV_URL: http://localhost:8080
          WEBDAV_USERNAME: ""
          WEBDAV_PASSWORD: ""
          WEBDAV_MEMOS_PATH: /Memos
          JWT_SECRET: test-jwt-secret-key-for-testing-only-32-chars
          ADMIN_EMAIL: admin@test.com
          OPENAI_API_KEY: test-key
          SITE_URL: http://localhost:4321
          SMTP_HOST: smtp.example.com
          SMTP_FROM_EMAIL: test@example.com
          PUBLIC_LUOSIMAO_SITE_KEY: test-site-key
          LUOSIMAO_SECRET_KEY: test-secret-key

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results-${{ matrix.shard }}
          path: |
            test-results/
            !test-results/html-report-*/
          retention-days: 7

      - name: Upload HTML report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-html-report-${{ matrix.shard }}
          path: test-results/html-report-${{ matrix.shard }}/
          retention-days: 7

  # 合并 E2E 测试报告
  merge-e2e-reports:
    name: Merge E2E Reports
    runs-on: ubuntu-22.04
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.13'

      - name: Install dependencies
        run: bun install --frozen

      - name: Download all reports
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-1
          path: all-reports/

      - name: Download report 2
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-2
          path: all-reports/

      - name: Download report 3
        uses: actions/download-artifact@v3
        with:
          name: e2e-html-report-3
          path: all-reports/

      - name: Merge HTML reports
        run: bunx playwright merge-reports --reporter html all-reports/

      - name: Upload merged report
        uses: actions/upload-artifact@v3
        with:
          name: e2e-merged-report
          path: playwright-report/
          retention-days: 14

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    needs: [unit-tests, e2e-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.USER_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Get Git information
        id: git-info
        run: |
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "repository_url=https://git.ivanli.cc/${{ github.repository }}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.git-info.outputs.build_date }}
            COMMIT_HASH=${{ steps.git-info.outputs.commit_hash }}
            COMMIT_SHORT_HASH=${{ steps.git-info.outputs.commit_short_hash }}
            REPOSITORY_URL=${{ steps.git-info.outputs.repository_url }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-22.04
    needs: docker
    steps:
      - name: Notify Watchtower
        run: |
          curl --oauth2-bearer ${{ secrets.WATCHTOWER_TOKEN }} 'https://watchtower.ivanli.cc/v1/update?images=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'

        env:
          WATCHTOWER_HOST: ${{ secrets.WATCHTOWER_HOST }}  # Watchtower 主机地址
          WATCHTOWER_PORT: ${{ secrets.WATCHTOWER_PORT }}  # Watchtower 端口

