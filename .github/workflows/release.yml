name: Release (PR Label Driven)

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64

concurrency:
  group: release-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      bump_level: ${{ steps.meta.outputs.bump_level }}
      channel: ${{ steps.meta.outputs.channel }}
      intent_type: ${{ steps.meta.outputs.intent_type }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
      pr_url: ${{ steps.meta.outputs.pr_url }}
      is_latest_branch_head: ${{ steps.meta.outputs.is_latest_branch_head }}
      reason: ${{ steps.meta.outputs.reason }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      app_version: ${{ steps.meta.outputs.app_version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      head_branch: ${{ steps.meta.outputs.head_branch }}
    steps:
      - name: Checkout workflow head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release intent from PR labels
        id: intent
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: bash ./.github/scripts/release-intent.sh

      - name: Compute release version/tag
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        id: version
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          CHANNEL: ${{ steps.intent.outputs.channel }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash ./.github/scripts/compute-version.sh

      - name: Export metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "head_branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

          echo "should_release=${{ steps.intent.outputs.should_release }}" >> "$GITHUB_OUTPUT"
          echo "bump_level=${{ steps.intent.outputs.bump_level }}" >> "$GITHUB_OUTPUT"
          echo "channel=${{ steps.intent.outputs.channel }}" >> "$GITHUB_OUTPUT"
          echo "intent_type=${{ steps.intent.outputs.intent_type }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ steps.intent.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${{ steps.intent.outputs.pr_url }}" >> "$GITHUB_OUTPUT"
          echo "is_latest_branch_head=${{ steps.intent.outputs.is_latest_branch_head }}" >> "$GITHUB_OUTPUT"
          echo "reason=${{ steps.intent.outputs.reason }}" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.intent.outputs.should_release }}" == "true" ]]; then
            echo "release_tag=${{ steps.version.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "app_version=${{ steps.version.outputs.app_version }}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=${{ steps.version.outputs.is_prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "app_version=" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git user
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.release_tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skip creating."
            exit 0
          fi

          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release intent result"
            echo "- head_sha: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "- pr_number: \`${{ steps.intent.outputs.pr_number || 'n/a' }}\`"
            echo "- intent_type: \`${{ steps.intent.outputs.intent_type || 'n/a' }}\`"
            echo "- channel: \`${{ steps.intent.outputs.channel || 'n/a' }}\`"
            echo "- is_latest_branch_head: \`${{ steps.intent.outputs.is_latest_branch_head || 'false' }}\`"
            echo "- should_release: \`${{ steps.intent.outputs.should_release }}\`"
            echo "- reason: \`${{ steps.intent.outputs.reason }}\`"
            echo "- release_tag: \`${{ steps.version.outputs.release_tag || 'n/a' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    timeout-minutes: 60
    steps:
      - name: Checkout workflow head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Re-check branch head before pushing latest
        id: latest-head
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = "${{ needs.prepare.outputs.head_branch }}";
            const expectedSha = "${{ needs.prepare.outputs.head_sha }}";
            const { data } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
            });
            const currentSha = data?.object?.sha ?? "";
            const isCurrentHead = currentSha === expectedSha;
            core.info(`latest-head check: branch=${branch} expected=${expectedSha} current=${currentSha} isCurrent=${isCurrentHead}`);
            core.setOutput("is_current_head", isCurrentHead ? "true" : "false");

      - name: Compute Docker tags by channel
        id: docker-tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}"
          release_tag="${{ needs.prepare.outputs.release_tag }}"
          channel="${{ needs.prepare.outputs.channel }}"
          is_latest_branch_head="${{ needs.prepare.outputs.is_latest_branch_head }}"
          is_current_head="${{ steps.latest-head.outputs.is_current_head }}"

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${release_tag}"
            if [[ "${channel}" == "stable" && "${is_latest_branch_head}" == "true" && "${is_current_head}" == "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Gather git metadata
        id: git-info
        shell: bash
        run: |
          set -euo pipefail
          echo "commit_hash=${{ needs.prepare.outputs.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "commit_short_hash=$(echo '${{ needs.prepare.outputs.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "repository_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${{ needs.prepare.outputs.head_branch }}" >> "$GITHUB_OUTPUT"
          echo "branch_url=https://github.com/${{ github.repository }}/tree/${{ needs.prepare.outputs.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Read drizzle-orm version from package.json
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -e "const p=require('./package.json'); const v=(p.dependencies&&p.dependencies['drizzle-orm'])||(p.devDependencies&&p.devDependencies['drizzle-orm'])||''; process.stdout.write(String(v||'').replace(/^\\D+/,''));")
          echo "drizzle_version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app-image-built
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.app_version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.head_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ needs.prepare.outputs.release_tag }}
          build-args: |
            BUILD_DATE=${{ steps.git-info.outputs.build_date }}
            COMMIT_HASH=${{ steps.git-info.outputs.commit_hash }}
            COMMIT_SHORT_HASH=${{ steps.git-info.outputs.commit_short_hash }}
            REPOSITORY_URL=${{ steps.git-info.outputs.repository_url }}
            BRANCH_NAME=${{ steps.git-info.outputs.branch_name }}
            BRANCH_URL=${{ steps.git-info.outputs.branch_url }}
            WITH_PLAYWRIGHT=false
            DRIZZLE_ORM_VERSION=${{ steps.pkg.outputs.drizzle_version }}

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
