name: E2E Tests

on:
  push:
    branches:
      - main
      - nextjs
      - develop
  pull_request:
    branches:
      - main
      - nextjs
      - develop
  workflow_dispatch: # 允许手动触发

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install system dependencies (lsof)
        run: sudo apt-get update && sudo apt-get install -y lsof
      - name: Install Rust and dufs
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          cargo install dufs
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Initialize Database
        run: bun run migrate
      - name: Generate Test Content Files
        run: bun run test-data:generate
      - name: Wait for dufs installation
        run: |
          # 确保dufs已安装并可用
          which dufs || exit 1
          echo "dufs is available at: $(which dufs)"
      - name: Sync Content from Sources
        run: bun run test-sync:trigger
        env:
          WEBDAV_URL: http://localhost:8080
          ADMIN_EMAIL: admin-${{ github.run_id }}-${{ github.run_attempt }}@test.local
      - name: Verify Test Data (Debug)
        run: bun run db:posts
      - name: Run E2E tests
        run: bun run test:e2e
        env:
          NODE_ENV: test
          CI: true
          WEBDAV_URL: http://localhost:8080
          ADMIN_EMAIL: admin-${{ github.run_id }}-${{ github.run_attempt }}@test.local
          ADMIN_MODE: true
      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/html-report
            test-results/artifacts
          if-no-files-found: warn

