name: E2E Tests

on:
  push:
    branches:
      - main
      - nextjs
      - develop
  pull_request:
    branches:
      - main
      - nextjs
      - develop
  workflow_dispatch: # 允许手动触发

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions for all jobs on GitHub Actions
permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install system dependencies (lsof)
        run: sudo apt-get update && sudo apt-get install -y lsof
      - name: Install dufs (GitHub release binary)
        shell: bash
        run: |
          set -euo pipefail
          echo "Resolving latest dufs release for current architecture..."
          ARCH_RAW="$(uname -m)"
          case "$ARCH_RAW" in
            x86_64|amd64) ARCH="x86_64" ;;
            aarch64|arm64) ARCH="aarch64" ;;
            *) echo "Unsupported architecture: $ARCH_RAW" >&2; exit 1 ;;
          esac

          # Prefer static musl build for broad compatibility on CI/Gitea runners
          # Resolve latest tag without GitHub API to avoid rate limits
          LATEST_URL=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/sigoden/dufs/releases/latest)
          TAG=${LATEST_URL##*/}
          if [[ -z "${TAG:-}" ]]; then
            echo "Failed to resolve latest tag from releases/latest redirect" >&2; exit 1
          fi
          # Try musl first, then gnu
          BASE="https://github.com/sigoden/dufs/releases/download/${TAG}"
          for libc in musl gnu; do
            CANDIDATE="${BASE}/dufs-${TAG}-${ARCH}-unknown-linux-${libc}.tar.gz"
            echo "Probing: $CANDIDATE"
            if curl -fsSLI "$CANDIDATE" >/dev/null 2>&1; then
              ASSET_URL="$CANDIDATE"
              break
            fi
          done
          if [[ -z "${ASSET_URL:-}" ]]; then
            echo "No suitable dufs asset found for ${TAG} ${ARCH}" >&2; exit 1
          fi
          echo "Downloading: $ASSET_URL"
          curl -fsSL -o dufs.tar.gz "$ASSET_URL"
          mkdir -p dufs-dist
          tar -xzf dufs.tar.gz -C dufs-dist

          # Locate extracted binary (layout may vary by release)
          DUFS_BIN=$(find dufs-dist -type f -name dufs -print -quit)
          if [[ -z "${DUFS_BIN:-}" ]]; then
            echo "dufs binary not found after extraction" >&2
            ls -R dufs-dist || true
            exit 1
          fi

          # Install with sudo when available, otherwise into ~/.local/bin and add to PATH
          if command -v sudo >/dev/null 2>&1; then
            echo "Installing dufs to /usr/local/bin via sudo..."
            sudo install -m 0755 "$DUFS_BIN" /usr/local/bin/dufs
            BIN_PATH="/usr/local/bin/dufs"
          else
            echo "Installing dufs to ~/.local/bin (no sudo)..."
            mkdir -p "$HOME/.local/bin"
            install -m 0755 "$DUFS_BIN" "$HOME/.local/bin/dufs"
            BIN_PATH="$HOME/.local/bin/dufs"
            if [[ -n "${GITHUB_PATH:-}" ]]; then
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            else
              echo "export PATH=\"$HOME/.local/bin:$PATH\"" >> "$HOME/.profile"
              export PATH="$HOME/.local/bin:$PATH"
            fi
          fi
          echo "> Installed $($BIN_PATH --version)"
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Prepare Test Environment
        run: bun run test-env:reset
        env:
          WEBDAV_URL: http://localhost:25091
          ADMIN_EMAIL: admin-${{ github.run_id }}-${{ github.run_attempt }}@test.local
          DB_PATH: ./test-data/sqlite.db
      - name: Wait for dufs installation
        run: |
          # 确保dufs已安装并可用
          which dufs || exit 1
          echo "dufs is available at: $(which dufs)"
      - name: Verify Test Data (Debug)
        run: bun run test-db:posts
      - name: Run E2E tests
        run: bun run test:e2e
        env:
          NODE_ENV: test
          CI: true
          WEBDAV_URL: http://localhost:25091
          ADMIN_EMAIL: admin-${{ github.run_id }}-${{ github.run_attempt }}@test.local
          ADMIN_MODE: true
      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # Use a single root to avoid multi-path warning on GHES/Gitea
          path: test-results
          if-no-files-found: warn
