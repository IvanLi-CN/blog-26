name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - nextjs
      - develop
  pull_request:
    branches:
      - main
      - nextjs
      - develop
  release:
    types: [ published ]
  workflow_dispatch: # 允许手动触发

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('ci-{0}-push-{1}', github.workflow, github.run_id) }}
  # Keep PR churn fast while preserving every push run for workflow_run release triggering.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimal default permissions for all jobs on GitHub Actions
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run check

  unit-tests:
    name: Unit Tests (exclude old/)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests
        run: bun ./scripts/run-precommit-tests.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, unit-tests]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Prepare local-only fixture data
        run: bun run test-env:reset-fs-only
        env:
          DB_PATH: ./test-data/sqlite.db
          LOCAL_CONTENT_BASE_PATH: ./test-data/local
          CONTENT_SOURCES: local
      - name: Build
        run: NODE_ENV=production bun run build
        env:
          DB_PATH: ./test-data/sqlite.db
          LOCAL_CONTENT_BASE_PATH: ./test-data/local
          CONTENT_SOURCES: local
          NEXT_PUBLIC_API_BASE_URL: https://ivanli.cc
          PUBLIC_API_BASE_URL: https://ivanli.cc
          NEXT_PUBLIC_SITE_URL: https://ivanli-cn.github.io/blog-26
          PUBLIC_SITE_URL: https://ivanli-cn.github.io/blog-26
          NEXT_PUBLIC_SITE_BASE_PATH: /blog-26
          PUBLIC_SITE_BASE_PATH: /blog-26

      - name: Verify GitHub Pages project-path output
        run: bun ./scripts/verify-pages-build.ts
        env:
          PUBLIC_API_BASE_URL: https://ivanli.cc
          PUBLIC_SITE_URL: https://ivanli-cn.github.io/blog-26
          PUBLIC_SITE_BASE_PATH: /blog-26

  # Docker 仅构建校验（不推送）
  docker:
    # Keep the historical job name to avoid breaking required check contexts.
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/nextjs'))
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare local-only fixture data
        run: bun run test-env:reset-fs-only
        env:
          DB_PATH: ./test-data/sqlite.db
          LOCAL_CONTENT_BASE_PATH: ./test-data/local
          CONTENT_SOURCES: local

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Git information
        id: git-info
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME:-${GITHUB_HEAD_REF:-}}"
          if [ -z "$ref_name" ]; then
            ref_name="$(git rev-parse --abbrev-ref HEAD)"
          fi
          echo "commit_hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "repository_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "branch_url=https://github.com/${{ github.repository }}/tree/${ref_name}" >> "$GITHUB_OUTPUT"

      - name: Read drizzle-orm version from package.json
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -e "const p=require('./package.json'); const v=(p.dependencies&&p.dependencies['drizzle-orm'])||(p.devDependencies&&p.devDependencies['drizzle-orm'])||''; process.stdout.write(String(v||'').replace(/^\D+/,''));")
          echo "drizzle_version=${ver}" >> $GITHUB_OUTPUT

      - name: Build Docker image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app-image-built
          platforms: ${{ env.PLATFORMS }}
          push: false
          load: true
          tags: blog-nextjs:ci-smoke
          labels: |
            org.opencontainers.image.revision=${{ steps.git-info.outputs.commit_hash }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            BUILD_DATE=${{ steps.git-info.outputs.build_date }}
            COMMIT_HASH=${{ steps.git-info.outputs.commit_hash }}
            COMMIT_SHORT_HASH=${{ steps.git-info.outputs.commit_short_hash }}
            REPOSITORY_URL=${{ steps.git-info.outputs.repository_url }}
            BRANCH_NAME=${{ steps.git-info.outputs.branch_name }}
            BRANCH_URL=${{ steps.git-info.outputs.branch_url }}
            WITH_PLAYWRIGHT=false
            DRIZZLE_ORM_VERSION=${{ steps.pkg.outputs.drizzle_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test single-image runtime
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ./test-data/job-logs

          wait_for_status() {
            local expected_status="$1"
            local url="$2"
            local output_file="$3"
            local attempts="${4:-90}"
            local sleep_seconds="${5:-2}"
            local status=""

            for _ in $(seq 1 "$attempts"); do
              status="$(curl -sS -o "$output_file" -w '%{http_code}' "$url" || true)"
              if [ "$status" = "$expected_status" ]; then
                return 0
              fi
              sleep "$sleep_seconds"
            done

            echo "Timed out waiting for ${url} to return ${expected_status}; last status=${status}" >&2
            cat "$output_file" >&2 || true
            return 1
          }

          wait_for_status_with_grep() {
            local expected_status="$1"
            local url="$2"
            local output_file="$3"
            local pattern="$4"
            local attempts="${5:-90}"
            local sleep_seconds="${6:-2}"
            local status=""

            for _ in $(seq 1 "$attempts"); do
              status="$(curl -sS -o "$output_file" -w '%{http_code}' "$url" || true)"
              if [ "$status" = "$expected_status" ] && grep -q "$pattern" "$output_file"; then
                return 0
              fi
              sleep "$sleep_seconds"
            done

            echo "Timed out waiting for ${url} to return ${expected_status} with pattern ${pattern}; last status=${status}" >&2
            cat "$output_file" >&2 || true
            return 1
          }

          docker rm -f blog-nextjs-ci-smoke >/dev/null 2>&1 || true

          docker run -d \
            --name blog-nextjs-ci-smoke \
            -p 127.0.0.1:25090:25090 \
            -e CONTENT_SOURCES=local \
            -e LOCAL_CONTENT_BASE_PATH=/app/data/local \
            -e DB_PATH=/app/data/sqlite.db \
            -e SITE_URL=http://127.0.0.1:25090 \
            -v "$PWD/test-data:/app/data" \
            blog-nextjs:ci-smoke

          wait_for_status "200" "http://127.0.0.1:25090/api/health" "/tmp/docker-health.json"
          cat /tmp/docker-health.json
          python3 - <<'PY'
          import json
          with open("/tmp/docker-health.json", "r", encoding="utf-8") as f:
              health = json.load(f)
          assert health["status"] == "ok", health
          assert health["site"]["status"] == "external", health
          assert health["legacyNext"]["status"] == "not-applicable", health
          PY

          wait_for_status \
            "404" \
            "http://127.0.0.1:25090/posts" \
            "/tmp/docker-posts.html"

          wait_for_status \
            "200" \
            "http://127.0.0.1:25090/api/public/posts?limit=1" \
            "/tmp/docker-posts.json"

          python3 - <<'PY'
          import json
          with open("/tmp/docker-posts.json", "r", encoding="utf-8") as f:
              payload = json.load(f)
          assert isinstance(payload, dict), payload
          assert "posts" in payload, payload
          assert payload["posts"], payload
          assert payload["pagination"]["totalPages"] >= 1, payload
          PY

          wait_for_status \
            "200" \
            "http://127.0.0.1:25090/api/public/comments?slug=graphql-api-best-practices" \
            "/tmp/docker-comments.json"
          python3 - <<'PY'
          import json
          with open("/tmp/docker-comments.json", "r", encoding="utf-8") as f:
              payload = json.load(f)
          assert isinstance(payload, dict), payload
          assert "comments" in payload, payload
          assert "totalPages" in payload, payload
          assert "isAdmin" in payload, payload
          PY

          wait_for_status "401" "http://127.0.0.1:25090/admin" "/tmp/docker-admin.html"

      - name: Dump docker smoke logs on failure
        if: failure()
        shell: bash
        run: |
          docker logs blog-nextjs-ci-smoke || true

      - name: Cleanup docker smoke container
        if: always()
        shell: bash
        run: |
          docker rm -f blog-nextjs-ci-smoke >/dev/null 2>&1 || true
