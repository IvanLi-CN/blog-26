name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - nextjs
      - develop
  pull_request:
    branches:
      - main
      - nextjs
      - develop
  release:
    types: [ published ]
  workflow_dispatch: # 允许手动触发

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions for all jobs on GitHub Actions
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run check

  unit-tests:
    name: Unit Tests (exclude old/)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests
        run: bun ./scripts/run-precommit-tests.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, unit-tests]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Cache Bun & deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: NODE_ENV=production bun run build

  # Docker 仅构建校验（不推送）
  docker:
    # Keep the historical job name to avoid breaking required check contexts.
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/nextjs')
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Git information
        id: git-info
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME:-${GITHUB_HEAD_REF:-}}"
          if [ -z "$ref_name" ]; then
            ref_name="$(git rev-parse --abbrev-ref HEAD)"
          fi
          echo "commit_hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "repository_url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "branch_url=https://github.com/${{ github.repository }}/tree/${ref_name}" >> "$GITHUB_OUTPUT"

      - name: Read drizzle-orm version from package.json
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -e "const p=require('./package.json'); const v=(p.dependencies&&p.dependencies['drizzle-orm'])||(p.devDependencies&&p.devDependencies['drizzle-orm'])||''; process.stdout.write(String(v||'').replace(/^\D+/,''));")
          echo "drizzle_version=${ver}" >> $GITHUB_OUTPUT

      - name: Build Docker image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app-image-built
          platforms: ${{ env.PLATFORMS }}
          push: false
          labels: |
            org.opencontainers.image.revision=${{ steps.git-info.outputs.commit_hash }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            BUILD_DATE=${{ steps.git-info.outputs.build_date }}
            COMMIT_HASH=${{ steps.git-info.outputs.commit_hash }}
            COMMIT_SHORT_HASH=${{ steps.git-info.outputs.commit_short_hash }}
            REPOSITORY_URL=${{ steps.git-info.outputs.repository_url }}
            BRANCH_NAME=${{ steps.git-info.outputs.branch_name }}
            BRANCH_URL=${{ steps.git-info.outputs.branch_url }}
            WITH_PLAYWRIGHT=false
            DRIZZLE_ORM_VERSION=${{ steps.pkg.outputs.drizzle_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
