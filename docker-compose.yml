services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      # Database
      - DB_PATH=/app/data/sqlite.db
      
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      
      # WebDAV Configuration
      - WEBDAV_URL=${WEBDAV_URL}
      - WEBDAV_USERNAME=${WEBDAV_USERNAME}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD}
      - WEBDAV_PROJECTS_PATH=${WEBDAV_PROJECTS_PATH}
      - WEBDAV_EXCLUDE_PATHS=${WEBDAV_EXCLUDE_PATHS}
      - WEBDAV_MEMOS_PATH=${WEBDAV_MEMOS_PATH}
      
      # Model Configuration
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME}
      
      # Site Configuration
      - SITE_URL=${SITE_URL}
      - JWT_SECRET=${JWT_SECRET}
      
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      
      # Admin Configuration
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      
      # Luosimao Captcha Configuration
      - PUBLIC_LUOSIMAO_SITE_KEY=${PUBLIC_LUOSIMAO_SITE_KEY}
      - LUOSIMAO_SECRET_KEY=${LUOSIMAO_SECRET_KEY}
      
      # Host Configuration
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./drizzle:/app/drizzle
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
