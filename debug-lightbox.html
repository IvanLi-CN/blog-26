<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯箱关闭测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .log {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>灯箱关闭逻辑测试</h1>
    
    <div class="test-section">
        <h3>测试说明</h3>
        <p>这个页面模拟了灯箱关闭的逻辑，帮助调试为什么需要点击两次关闭按钮。</p>
        <p>请打开浏览器开发者工具的控制台查看详细日志。</p>
    </div>

    <div class="test-section">
        <h3>模拟操作</h3>
        <button class="button" onclick="openLightbox()">打开灯箱</button>
        <button class="button" onclick="closeLightbox()">关闭灯箱</button>
        <button class="button" onclick="clearHash()">清除Hash</button>
        <button class="button" onclick="clearLog()">清除日志</button>
    </div>

    <div class="test-section">
        <h3>当前状态</h3>
        <p>灯箱状态: <span id="lightboxStatus">关闭</span></p>
        <p>URL Hash: <span id="hashStatus">无</span></p>
        <p>点击计数: <span id="clickCount">0</span></p>
    </div>

    <div class="test-section">
        <h3>事件日志</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let isLightboxOpen = false;
        let clickCount = 0;
        
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        function updateStatus() {
            document.getElementById('lightboxStatus').textContent = isLightboxOpen ? '打开' : '关闭';
            document.getElementById('hashStatus').textContent = window.location.hash || '无';
            document.getElementById('clickCount').textContent = clickCount;
        }
        
        function openLightbox() {
            log('🔵 用户操作: 打开灯箱');
            isLightboxOpen = true;
            window.location.hash = '#image-test123';
            log('✅ 灯箱已打开，hash已设置');
            updateStatus();
        }
        
        function closeLightbox() {
            clickCount++;
            log(`🔴 用户操作: 关闭灯箱 (第${clickCount}次点击)`);
            
            // 模拟 ContentImageHandler.closeLightbox() 的逻辑
            log('📝 执行: setLightbox({ isOpen: false })');
            isLightboxOpen = false;
            
            // 这会触发 useEffect 来清除 hash
            log('🔄 useEffect 检测到灯箱关闭，准备清除 hash');
            setTimeout(() => {
                if (window.location.hash.match(/^#image-.+$/)) {
                    log('🗑️ 清除 URL hash');
                    window.history.pushState(null, '', window.location.pathname + window.location.search);
                }
            }, 10);
            
            updateStatus();
        }
        
        function clearHash() {
            log('🗑️ 手动清除 hash');
            window.history.pushState(null, '', window.location.pathname + window.location.search);
            updateStatus();
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            clickCount = 0;
            updateStatus();
        }
        
        // 监听 hash 变化
        window.addEventListener('hashchange', () => {
            log(`🔄 hashchange 事件: ${window.location.hash}`);
            
            const imageId = window.location.hash.match(/^#image-(.+)$/);
            if (imageId && !isLightboxOpen) {
                log('📂 检测到图片 hash 且灯箱未打开，打开灯箱');
                isLightboxOpen = true;
            } else if (!imageId && isLightboxOpen) {
                log('❌ 检测到 hash 被清除且灯箱打开，关闭灯箱');
                isLightboxOpen = false;
            }
            updateStatus();
        });
        
        // 监听 popstate 事件
        window.addEventListener('popstate', () => {
            log(`⬅️ popstate 事件: ${window.location.hash}`);
            updateStatus();
        });
        
        // 初始化
        updateStatus();
        log('🚀 测试页面已加载');
    </script>
</body>
</html>
