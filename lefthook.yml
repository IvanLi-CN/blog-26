pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,scss,sass,less}"
      run: bunx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git update-index --again
    test:
      run: bun run test
      fail_text: "Tests failed. Please fix the failing tests before committing."
    checkBuild:
      run: bun run check:astro
      fail_text: "TypeScript/Astro check failed. Please fix the errors before committing."

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
      fail_text: "Commit message does not follow conventional commits format or contains non-English characters. Please check commitlint.config.cjs for rules."
