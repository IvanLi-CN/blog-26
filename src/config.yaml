site:
  name: "Ivan's Blog"
  site: 'https://ivanli.cc'
  base: '/'
  trailingSlash: false
  owner: "Ivan Li"
  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: "Ivan's Blog"
    template: "%s — Ivan's Blog"
  description: "这是 Ivan 的个人博客，记录和分享有关技术、生活和想法的内容。"
  keywords: "Ivan, Blog, 技术, 生活, 想法"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: "Ivan's Blog"
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@onwidget'
    site: '@onwidget'
    cardType: summary_large_image

i18n:
  language: zh-CN
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 7
    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
